<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head><body>
<title>VOLT — DnB &amp; Trance Tracker</title>
<style>
:root{
  --bg:#0a0c12; --panel:#10141d; --raised:#171d2a; --line:#232b3a;
  --txt:#c7d1e0; --dim:#68748a; --faint:#3d4658;
  --teal:#3fe0b4; --teal-dim:#1d5c4c; --mag:#ff4d9d; --amber:#f0b24e; --blue:#6aaeff;
  --mono:ui-monospace,'JetBrains Mono','Cascadia Code','Fira Code',Menlo,Consolas,monospace;
  --sans:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);font-size:13px;overflow:hidden;display:flex;flex-direction:column}
button{font-family:var(--sans);font-size:12px;color:var(--txt);background:var(--raised);border:1px solid var(--line);border-radius:3px;padding:4px 10px;cursor:pointer}
button:hover{border-color:var(--teal);color:var(--teal)}
button:focus-visible,input:focus-visible,select:focus-visible{outline:1px solid var(--teal);outline-offset:1px}
button.on{background:var(--teal-dim);border-color:var(--teal);color:var(--teal)}
button.danger:hover{border-color:var(--mag);color:var(--mag)}
input[type=number],select{background:var(--bg);border:1px solid var(--line);border-radius:3px;color:var(--txt);font-family:var(--mono);font-size:12px;padding:3px 5px}
input[type=number]{width:52px}
label.fld{display:flex;align-items:center;gap:5px;color:var(--dim);font-size:10px;letter-spacing:.08em;text-transform:uppercase}

/* ---- top bar ---- */
#top{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
#logo{font-family:var(--mono);font-weight:700;font-size:16px;letter-spacing:.18em;color:var(--txt);user-select:none}
#logo b{color:var(--teal);font-weight:700}
.sep{width:1px;height:22px;background:var(--line)}
#top .grp{display:flex;align-items:center;gap:6px}
#playPat.playing,#playSong.playing{background:var(--teal-dim);border-color:var(--teal);color:var(--teal)}

/* ---- layout ---- */
#main{flex:1;display:flex;min-height:0}
#side{width:252px;min-width:252px;background:var(--panel);border-right:1px solid var(--line);overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:14px}
#side h3{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:6px;font-weight:600}
#instList{display:flex;flex-direction:column;gap:1px;font-family:var(--mono);font-size:12px;max-height:190px;overflow-y:auto}
#instList .irow{display:flex;gap:8px;padding:3px 6px;border-radius:3px;cursor:pointer;color:var(--dim)}
#instList .irow:hover{background:var(--raised)}
#instList .irow.sel{background:var(--raised);color:var(--teal)}
#instList .irow .no{color:var(--blue)}
.btnrow{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.btnrow button{padding:3px 8px;font-size:11px}
.param{display:grid;grid-template-columns:64px 1fr 40px;align-items:center;gap:6px;margin-bottom:4px}
.param .pn{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim)}
.param .pv{font-family:var(--mono);font-size:11px;color:var(--amber);text-align:right;font-variant-numeric:tabular-nums}
input[type=range]{-webkit-appearance:none;appearance:none;height:16px;background:transparent;width:100%}
input[type=range]::-webkit-slider-runnable-track{height:3px;background:var(--line);border-radius:2px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--teal);margin-top:-4px}
input[type=range]::-moz-range-track{height:3px;background:var(--line);border-radius:2px}
input[type=range]::-moz-range-thumb{width:11px;height:11px;border:none;border-radius:50%;background:var(--teal)}

/* ---- pattern grid ---- */
#gridwrap{flex:1;overflow:auto;font-family:var(--mono);font-size:13px;line-height:1.5;position:relative;background:var(--bg)}
#ghead{position:sticky;top:0;z-index:2;display:inline-flex;background:var(--panel);border-bottom:1px solid var(--line);min-width:100%}
#ghead .rn{color:transparent}
#ghead .thead{display:inline-flex;align-items:center;gap:6px;justify-content:center}
#ghead .tno{color:var(--dim);font-size:11px}
#ghead .tbtn{font-size:9px;padding:0 4px;line-height:14px;border-radius:2px;border:1px solid var(--line);background:transparent;color:var(--faint);cursor:pointer}
#ghead .tbtn.mON{background:#4a1526;border-color:var(--mag);color:var(--mag)}
#ghead .tbtn.sON{background:var(--teal-dim);border-color:var(--teal);color:var(--teal)}
.prow{display:inline-flex;white-space:pre;min-width:100%}
.prow .rn{color:var(--faint);padding:0 8px 0 10px;user-select:none}
.prow.b4 .rn{color:var(--dim)}
.prow.b16 .rn{color:var(--amber)}
.prow.b4{background:#0d1019}
.prow.b16{background:#10141f}
.prow.playrow{background:#123328;box-shadow:inset 2px 0 0 var(--teal)}
.tcell{padding:0 7px;border-left:1px solid #161b26}
.tcell i{font-style:normal;color:var(--faint)}
.tcell i.set{color:var(--txt)}
.tcell i[data-c="1"].set,.tcell i[data-c="2"].set{color:var(--blue)}
.tcell i[data-c="3"].set,.tcell i[data-c="4"].set{color:var(--amber)}
.tcell i[data-c="5"].set,.tcell i[data-c="6"].set,.tcell i[data-c="7"].set{color:var(--mag)}
.tcell i.cur{background:var(--teal);color:#062019 !important;border-radius:1px}
.tcell i.off{color:var(--mag);letter-spacing:.05em}

/* ---- order strip ---- */
#orderRow{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
#orderRow .lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
#ordChips{display:flex;gap:4px;flex-wrap:wrap}
.chip{font-family:var(--mono);font-size:11px;padding:2px 4px 2px 7px;background:var(--raised);border:1px solid var(--line);border-radius:3px;cursor:pointer;display:flex;gap:5px;align-items:center;color:var(--dim)}
.chip.cur{border-color:var(--teal);color:var(--teal)}
.chip.playing{background:var(--teal-dim)}
.chip u{text-decoration:none;color:var(--faint);padding:0 2px}
.chip u:hover{color:var(--mag)}

/* ---- footer ---- */
#foot{padding:5px 12px;background:var(--panel);border-top:1px solid var(--line);color:var(--dim);font-size:11px;display:flex;gap:16px;flex-wrap:wrap}
#foot b{color:var(--txt);font-weight:600;font-family:var(--mono)}
#status{color:var(--teal);margin-left:auto}
kbd{font-family:var(--mono);background:var(--raised);border:1px solid var(--line);border-radius:2px;padding:0 4px;font-size:10px;color:var(--txt)}
@media (prefers-reduced-motion:no-preference){ .chip,button{transition:border-color .12s,color .12s} }

/* ---- selection ---- */
.tcell i.ssel{background:rgba(63,224,180,.17)}
.tcell i.ssel.set{color:#eaf6f1}

/* ---- everything search panel ---- */
#esQ{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:3px;color:var(--txt);font-family:var(--mono);font-size:12px;padding:4px 6px}
#esResults{display:flex;flex-direction:column;gap:1px;margin-top:6px;max-height:230px;overflow-y:auto;font-size:11px}
.esrow{display:flex;align-items:center;gap:4px;padding:2px 4px;border-radius:3px}
.esrow:hover{background:var(--raised)}
.esrow .nm{flex:1;min-width:0}
.esrow .nm b{display:block;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.esrow .nm span{display:block;color:var(--faint);font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.esrow button{padding:1px 6px;font-size:10px;flex:none}
#esCfgPanel{display:flex;flex-direction:column;gap:4px;margin:6px 0;padding:6px;background:var(--raised);border:1px solid var(--line);border-radius:3px}
#esCfgPanel label{display:flex;align-items:center;justify-content:space-between;gap:6px;color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.06em}
#esCfgPanel input[type=text],#esCfgPanel input[type=password]{width:126px;background:var(--bg);border:1px solid var(--line);border-radius:3px;color:var(--txt);font-family:var(--mono);font-size:11px;padding:2px 4px}
#esMsg{color:var(--dim);font-size:10px;margin-top:4px;word-break:break-word}
#esMsg.err{color:var(--mag)}
#esDirName{color:var(--dim);font-size:10px;word-break:break-all}
#esCfgBtn{float:right;padding:0 6px;font-size:10px}
</style>

<div id="top">
  <span id="logo">VOLT<b>///</b></span>
  <span class="sep"></span>
  <div class="grp">
    <button id="playPat" title="Play pattern (Space)">&#9654; Pattern</button>
    <button id="playSong" title="Play song">&#9654; Song</button>
    <button id="stopBtn" title="Stop (Space)">&#9632;</button>
  </div>
  <span class="sep"></span>
  <div class="grp">
    <label class="fld">BPM <input type="number" id="bpm" min="40" max="300" value="174"></label>
    <label class="fld">Oct <input type="number" id="oct" min="0" max="7" value="4" style="width:40px"></label>
    <label class="fld">Step <input type="number" id="step" min="0" max="16" value="1" style="width:40px"></label>
  </div>
  <span class="sep"></span>
  <div class="grp">
    <label class="fld">Pattern <select id="patSel"></select></label>
    <label class="fld">Len <input type="number" id="patLen" min="8" max="128" value="64"></label>
    <button id="patNew" title="New empty pattern">+</button>
    <button id="patDup" title="Duplicate pattern">Dup</button>
  </div>
  <span class="sep"></span>
  <div class="grp">
    <button id="tplDnb" title="Load DnB template (replaces song)">DnB kit</button>
    <button id="tplTrance" title="Load Trance template (replaces song)">Trance kit</button>
  </div>
  <span class="sep"></span>
  <div class="grp">
    <button id="expBtn">Export</button>
    <button id="impBtn">Import</button>
    <input type="file" id="impFile" accept=".json" hidden>
  </div>
</div>

<div id="orderRow">
  <span class="lbl">Order</span>
  <div id="ordChips"></div>
  <button id="ordAdd" title="Append current pattern to song order" style="padding:2px 8px;font-size:11px">+ add</button>
</div>

<div id="main">
  <div id="side">
    <div>
      <h3>Instruments</h3>
      <div id="instList"></div>
      <div class="btnrow">
        <select id="newType"></select>
        <button id="instAdd">+ Synth</button>
        <button id="instSmp">Sample&#8230;</button>
        <input type="file" id="smpFile" accept="audio/*" multiple hidden>
      </div>
      <div class="btnrow">
        <button id="instRen">Rename</button>
        <button id="instDel" class="danger">Delete</button>
      </div>
    </div>
    <div>
      <h3>Sample Search <button id="esCfgBtn" title="Everything server settings">&#9881;</button></h3>
      <div id="esCfgPanel" hidden>
        <label>Host <input type="text" id="esHost"></label>
        <label>Port <input type="number" id="esPort" style="width:64px"></label>
        <label>User <input type="text" id="esUser" placeholder="(browser auth)"></label>
        <label>Pass <input type="password" id="esPass"></label>
        <label>Ext <input type="text" id="esExts"></label>
        <label>Copy to project <input type="checkbox" id="esCopy"></label>
        <div class="btnrow"><button id="esDir">Project folder&#8230;</button><button id="esSave">Save</button></div>
        <div id="esDirName"></div>
      </div>
      <input type="text" id="esQ" placeholder="Search samples (Everything)&#8230;" autocomplete="off" spellcheck="false">
      <div id="esResults"></div>
      <div id="esMsg"></div>
    </div>
    <div>
      <h3 id="parTitle">Params</h3>
      <div id="params"></div>
    </div>
    <div>
      <h3 id="trkTitle">Track 1</h3>
      <div id="trackMix"></div>
    </div>
  </div>
  <div id="gridwrap">
    <div id="ghead"></div>
    <div id="grows"></div>
  </div>
</div>

<div id="foot">
  <span><kbd>Z</kbd>&#8211;<kbd>M</kbd>/<kbd>Q</kbd>&#8211;<kbd>P</kbd> notes</span>
  <span><kbd>A</kbd> note-off</span>
  <span><kbd>Del</kbd> clear</span>
  <span><kbd>Space</kbd> play</span>
  <span><kbd>[</kbd><kbd>]</kbd> octave</span>
  <span><kbd>Shift</kbd>+arrows select &#183; <kbd>Ctrl</kbd><kbd>A</kbd> column&#8594;track&#8594;all &#183; <kbd>Ctrl</kbd><kbd>C</kbd>/<kbd>X</kbd>/<kbd>V</kbd> copy/cut/paste</span>
  <span>FX: <b>R</b>xx retrig &#183; <b>S</b>xx smp offset &#183; <b>U/D</b>xx slide &#183; <b>G</b>xx glide &#183; <b>C</b>xx cutoff</span>
  <span id="status"></span>
</div>

<script>
'use strict';
/* ================= constants ================= */
const TRACKS=8, OFF=-1;
const NOTENAMES=['C-','C#','D-','D#','E-','F-','F#','G-','G#','A-','A#','B-'];
const hex2=n=>n.toString(16).toUpperCase().padStart(2,'0');
const noteName=n=>n===OFF?'OFF':NOTENAMES[n%12]+Math.floor(n/12);
const nfreq=n=>440*Math.pow(2,(n-57)/12);
const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));

/* param schema: [min,max,default,exp?] */
const ITYPES={
  kick:    {label:'Kick',     p:{pitch:[30,90,50,0],punch:[0,1,.6,0],decay:[.05,1.2,.4,0],drive:[0,1,.3,0]}},
  snare:   {label:'Snare',    p:{tone:[100,400,190,1],snap:[0,1,.7,0],decay:[.04,.6,.16,0]}},
  hat:     {label:'Hat',      p:{tone:[3000,12000,7500,1],decay:[.02,1.2,.06,0]}},
  clap:    {label:'Clap',     p:{tone:[600,2400,1150,1],decay:[.05,.8,.22,0]}},
  sub:     {label:'Sub',      p:{harm:[0,1,.15,0],rel:[.02,.6,.06,0]}},
  reese:   {label:'Reese',    p:{voices:[1,4,3,0],detune:[0,60,18,0],cutoff:[60,6000,380,1],res:[0,20,7,0],lfoRate:[.05,12,.4,1],lfoAmt:[0,1,.35,0],drive:[0,1,.55,0],sub:[0,1,.5,0],rel:[.02,.8,.08,0]}},
  supersaw:{label:'Supersaw', p:{detune:[0,80,28,0],spread:[0,1,.85,0],hp:[40,900,160,1],cutoff:[300,16000,7000,1],att:[.001,.8,.01,0],rel:[.02,1.5,.25,0]}},
  pluck:   {label:'Pluck',    p:{cutoff:[100,4000,800,1],envAmt:[0,1,.6,0],decay:[.05,1,.3,0],res:[0,15,3,0]}},
  sampler: {label:'Sampler',  p:{root:[12,84,48,0],rel:[.01,.5,.04,0]}}
};
function defParams(type){const o={};for(const k in ITYPES[type].p)o[k]=ITYPES[type].p[k][2];return o}

/* ================= song model ================= */
let song=null, curPat=0, curInst=0;
const cursor={t:0,r:0,c:0};
let octave=4, editStep=1;

function mkPattern(rows){const d=[];for(let t=0;t<TRACKS;t++){d.push(new Array(rows).fill(null))}return{rows,data:d}}
function mkInst(type,name,over){const i={name,type,params:defParams(type)};if(over)Object.assign(i.params,over);return i}
function mkTrackset(){const a=[];for(let t=0;t<TRACKS;t++)a.push({vol:.85,dly:0,rvb:0,duck:0,mute:false,solo:false});return a}
function blankSong(){return{name:'untitled',bpm:170,lpb:4,instruments:[mkInst('kick','Kick'),mkInst('snare','Snare'),mkInst('hat','Hat'),mkInst('reese','Reese')],patterns:[mkPattern(64)],order:[0],trackset:mkTrackset()}}
function cellAt(t,r){return song.patterns[curPat].data[t][r]}
function ensureCell(t,r){const d=song.patterns[curPat].data;if(!d[t][r])d[t][r]={n:null,i:null,v:null,c:null,x:0};return d[t][r]}
function pruneCell(t,r){const c=cellAt(t,r);if(c&&c.n==null&&c.i==null&&c.v==null&&c.c==null)song.patterns[curPat].data[t][r]=null}

/* ================= audio engine ================= */
let AC=null, master, chans=[], noiseBuf, dlyIn, dlyL, dlyR, rvbIn;
function audio(){
  if(AC)return AC;
  AC=new (window.AudioContext||window.webkitAudioContext)();
  master=AC.createGain();master.gain.value=.8;
  const comp=AC.createDynamicsCompressor();
  comp.threshold.value=-9;comp.knee.value=8;comp.ratio.value=4;comp.attack.value=.004;comp.release.value=.18;
  master.connect(comp);comp.connect(AC.destination);
  /* noise */
  noiseBuf=AC.createBuffer(1,AC.sampleRate*2,AC.sampleRate);
  const nd=noiseBuf.getChannelData(0);for(let i=0;i<nd.length;i++)nd[i]=Math.random()*2-1;
  /* ping-pong delay bus */
  dlyIn=AC.createGain();
  dlyL=AC.createDelay(2);dlyR=AC.createDelay(2);
  const fb1=AC.createGain(),fb2=AC.createGain();fb1.gain.value=.42;fb2.gain.value=.42;
  const lhp=AC.createBiquadFilter();lhp.type='highpass';lhp.frequency.value=280;
  const pl=AC.createStereoPanner(),pr=AC.createStereoPanner();pl.pan.value=-.65;pr.pan.value=.65;
  const dout=AC.createGain();dout.gain.value=.9;
  dlyIn.connect(lhp);lhp.connect(dlyL);
  dlyL.connect(pl);pl.connect(dout);
  dlyL.connect(fb1);fb1.connect(dlyR);
  dlyR.connect(pr);pr.connect(dout);
  dlyR.connect(fb2);fb2.connect(dlyL);
  dout.connect(master);
  /* reverb bus */
  rvbIn=AC.createGain();
  const cv=AC.createConvolver();
  const irLen=Math.floor(AC.sampleRate*1.9), ir=AC.createBuffer(2,irLen,AC.sampleRate);
  for(let ch=0;ch<2;ch++){const b=ir.getChannelData(ch);for(let i=0;i<irLen;i++)b[i]=(Math.random()*2-1)*Math.pow(1-i/irLen,2.7)}
  cv.buffer=ir;
  const rhp=AC.createBiquadFilter();rhp.type='highpass';rhp.frequency.value=300;
  const rout=AC.createGain();rout.gain.value=.7;
  rvbIn.connect(rhp);rhp.connect(cv);cv.connect(rout);rout.connect(master);
  /* channels */
  for(let t=0;t<TRACKS;t++){
    const g=AC.createGain(), duckG=AC.createGain(), ds=AC.createGain(), rs=AC.createGain();
    g.connect(duckG);duckG.connect(master);duckG.connect(ds);duckG.connect(rs);
    ds.connect(dlyIn);rs.connect(rvbIn);
    chans.push({in:g,duckG,ds,rs,voice:null,lastI:null});
  }
  applyMix();setDelayTime();
  return AC;
}
function applyMix(){if(!AC)return;song.trackset.forEach((ts,t)=>{chans[t].in.gain.value=ts.vol;chans[t].ds.gain.value=ts.dly;chans[t].rs.gain.value=ts.rvb})}
function setDelayTime(){if(!AC)return;const d=60/song.bpm*.75;dlyL.delayTime.value=d;dlyR.delayTime.value=d}
function mkNoise(t,dur){const s=AC.createBufferSource();s.buffer=noiseBuf;s.loop=true;s.start(t);s.stop(t+dur);return s}
function mkShaper(amt){const ws=AC.createWaveShaper();const n=512,c=new Float32Array(n);const k=1+amt*24;
  for(let i=0;i<n;i++){const x=i/(n-1)*2-1;c[i]=Math.tanh(x*k)/Math.tanh(k)}ws.curve=c;ws.oversample='2x';return ws}

/* ---- voice factory ---- */
function baseVoice(g,srcs,note,rel){
  const bend=AC.createConstantSource();bend.offset.value=0;bend.start();
  const v={out:g,srcs,note,curNote:note,bendVal:0,bendSrc:bend,filter:null,rel:rel||.05,dead:false};
  srcs.forEach(s=>{if(s.detune)bend.connect(s.detune)});
  v.release=t=>{if(v.dead)return;v.dead=true;const r=Math.max(.005,v.rel);
    g.gain.cancelScheduledValues(t);g.gain.setTargetAtTime(0,t,r/3);
    srcs.forEach(s=>{try{s.stop(t+r*4+.1)}catch(e){}});bend.stop(t+r*4+.1)};
  v.cut=t=>{if(v.dead)return;v.dead=true;
    g.gain.cancelScheduledValues(t);g.gain.setTargetAtTime(0,t,.0025);
    srcs.forEach(s=>{try{s.stop(t+.06)}catch(e){}});bend.stop(t+.06)};
  v.slide=(cents,t,dur)=>{bend.offset.cancelScheduledValues(t);bend.offset.setValueAtTime(v.bendVal,t);
    v.bendVal+=cents;bend.offset.linearRampToValueAtTime(v.bendVal,t+dur)};
  v.glideTo=(note,t,dur)=>{const target=(note-v.note)*100;bend.offset.cancelScheduledValues(t);
    bend.offset.setValueAtTime(v.bendVal,t);bend.offset.linearRampToValueAtTime(target,t+dur);
    v.bendVal=target;v.curNote=note};
  return v;
}
function osc(type,f){const o=AC.createOscillator();o.type=type;o.frequency.value=f;return o}

function trig(inst,note,t,tr,vel,off){
  const p=inst.params, ch=chans[tr], g=AC.createGain();
  const rel={sub:p.rel,reese:p.rel,supersaw:p.rel,sampler:p.rel}[inst.type]||.05;
  let srcs=[], v;
  switch(inst.type){
  case 'kick':{
    const f0=p.pitch*Math.pow(2,(note-48)/12);
    const o=osc('sine',f0);
    o.frequency.setValueAtTime(Math.max(f0,f0*(3.5+4*p.punch)),t);
    o.frequency.exponentialRampToValueAtTime(f0,t+.03+.035*p.punch);
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vel,t+.002);
    g.gain.setTargetAtTime(0,t+.004,p.decay/3.2);
    if(p.drive>0){const sh=mkShaper(p.drive);o.connect(sh);sh.connect(g)}else o.connect(g);
    const ns=mkNoise(t,.012),nf=AC.createBiquadFilter();nf.type='highpass';nf.frequency.value=3500;
    const ng=AC.createGain();ng.gain.setValueAtTime(vel*p.punch*.6,t);ng.gain.setTargetAtTime(0,t+.001,.004);
    ns.connect(nf);nf.connect(ng);ng.connect(g);
    o.start(t);o.stop(t+p.decay*4+.15);srcs=[o,ns];
    break}
  case 'snare':{
    const o=osc('triangle',p.tone);
    o.frequency.setValueAtTime(p.tone*1.7,t);o.frequency.exponentialRampToValueAtTime(p.tone,t+.025);
    const bg=AC.createGain();bg.gain.setValueAtTime(vel*.55,t);bg.gain.setTargetAtTime(0,t+.002,.025);
    o.connect(bg);bg.connect(g);
    const ns=mkNoise(t,p.decay*4+.1);
    const bp=AC.createBiquadFilter();bp.type='bandpass';bp.frequency.value=1700;bp.Q.value=.8;
    const hp=AC.createBiquadFilter();hp.type='highpass';hp.frequency.value=450;
    const ng=AC.createGain();ng.gain.setValueAtTime(vel*p.snap,t);ng.gain.setTargetAtTime(0,t+.003,p.decay/3);
    ns.connect(hp);hp.connect(bp);bp.connect(ng);ng.connect(g);
    g.gain.value=1;o.start(t);o.stop(t+.15);srcs=[o,ns];
    break}
  case 'hat':{
    const ns=mkNoise(t,p.decay*4+.1);
    const hp=AC.createBiquadFilter();hp.type='highpass';hp.frequency.value=p.tone;
    g.gain.setValueAtTime(vel*.5,t);g.gain.setTargetAtTime(0,t+.001,p.decay/3);
    ns.connect(hp);hp.connect(g);srcs=[ns];
    break}
  case 'clap':{
    const bp=AC.createBiquadFilter();bp.type='bandpass';bp.frequency.value=p.tone;bp.Q.value=1.4;
    bp.connect(g);g.gain.value=1;
    for(let k=0;k<3;k++){const s=mkNoise(t+k*.011,.011);const bg=AC.createGain();bg.gain.value=vel*.7;
      s.connect(bg);bg.connect(bp);srcs.push(s)}
    const tail=mkNoise(t+.032,p.decay*4+.1);const tg=AC.createGain();
    tg.gain.setValueAtTime(vel*.6,t+.032);tg.gain.setTargetAtTime(0,t+.035,p.decay/3);
    tail.connect(tg);tg.connect(bp);srcs.push(tail);
    break}
  case 'sub':{
    const f=nfreq(note);
    const o=osc('sine',f), o2=osc('sine',f*2);
    const g2=AC.createGain();g2.gain.value=p.harm*.4;
    o.connect(g);o2.connect(g2);g2.connect(g);
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vel,t+.006);
    o.start(t);o2.start(t);srcs=[o,o2];
    break}
  case 'reese':{
    const f=nfreq(note), nv=Math.round(p.voices);
    const pre=AC.createGain();pre.gain.value=(1/Math.max(1,nv))*(1+p.drive*8);
    const sh=mkShaper(.3+p.drive*.7);
    const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=p.cutoff;lp.Q.value=p.res;
    pre.connect(sh);sh.connect(lp);lp.connect(g);
    for(let k=0;k<nv;k++){const det=nv>1?p.detune*(k/(nv-1)*2-1):0;
      const o=osc('sawtooth',f);o.detune.value=det;o.connect(pre);o.start(t);srcs.push(o)}
    if(p.sub>0){const so=osc('sine',f);const sg=AC.createGain();sg.gain.value=p.sub*.55;
      so.connect(sg);sg.connect(g);so.start(t);srcs.push(so)}
    const lfo=osc('sine',p.lfoRate);const lg=AC.createGain();lg.gain.value=p.lfoAmt*p.cutoff*.8;
    lfo.connect(lg);lg.connect(lp.frequency);lfo.start(t);srcs.push(lfo);
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vel*.9,t+.005);
    v=baseVoice(g,srcs,note,rel);v.filter=lp;break}
  case 'supersaw':{
    const f=nfreq(note), N=7;
    const mix=AC.createGain();mix.gain.value=.24;
    const hp=AC.createBiquadFilter();hp.type='highpass';hp.frequency.value=p.hp;
    const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=p.cutoff;lp.Q.value=.5;
    mix.connect(hp);hp.connect(lp);lp.connect(g);
    for(let k=0;k<N;k++){const o=osc('sawtooth',f);o.detune.value=p.detune*(k/(N-1)*2-1);
      const pan=AC.createStereoPanner();pan.pan.value=p.spread*((k%2?1:-1)*(k+1)/N);
      o.connect(pan);pan.connect(mix);o.start(t);srcs.push(o)}
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vel,t+Math.max(.002,p.att));
    g.gain.setTargetAtTime(vel*.75,t+p.att,.4);
    v=baseVoice(g,srcs,note,rel);v.filter=lp;break}
  case 'pluck':{
    const f=nfreq(note);
    const lp=AC.createBiquadFilter();lp.type='lowpass';lp.Q.value=p.res;
    lp.frequency.setValueAtTime(p.cutoff+p.envAmt*9000,t);
    lp.frequency.setTargetAtTime(p.cutoff,t+.002,p.decay/4);
    lp.connect(g);
    [ -6,6 ].forEach(dt=>{const o=osc('sawtooth',f);o.detune.value=dt;o.connect(lp);o.start(t);
      o.stop(t+p.decay*5+.2);srcs.push(o)});
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vel*.8,t+.003);
    g.gain.setTargetAtTime(0,t+.005,p.decay/2.5);
    v=baseVoice(g,srcs,note,rel);v.filter=lp;break}
  case 'sampler':{
    if(!inst.buffer){return null}
    const s=AC.createBufferSource();s.buffer=inst.buffer;
    s.playbackRate.value=Math.pow(2,(note-p.root)/12);
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vel,t+.002);
    s.connect(g);s.start(t,(off||0)*inst.buffer.duration);srcs=[s];
    break}
  }
  if(!v)v=baseVoice(g,srcs,note,rel);
  g.connect(ch.in);
  return v;
}
function duck(t){
  song.trackset.forEach((ts,tr)=>{if(ts.duck>0){const gp=chans[tr].duckG.gain;
    gp.cancelScheduledValues(t);gp.setTargetAtTime(1-ts.duck,t,.006);gp.setTargetAtTime(1,t+.09,.11)}});
}
function stopAllVoices(){if(!AC)return;const t=AC.currentTime;chans.forEach(ch=>{if(ch.voice)ch.voice.cut(t);ch.voice=null})}

/* ================= sequencer ================= */
const SEQ={playing:false,songMode:false,ord:0,row:0,next:0,timer:null,q:[]};
const rowDur=()=>60/song.bpm/song.lpb;
function play(songMode){
  audio();if(AC.state==='suspended')AC.resume();
  stop(true);stopAllVoices();
  SEQ.playing=true;SEQ.songMode=songMode;SEQ.row=0;SEQ.ord=0;SEQ.q=[];
  if(songMode&&song.order.length)curPatSet(song.order[0]);
  SEQ.next=AC.currentTime+.08;
  SEQ.timer=setInterval(pump,30);pump();
  document.getElementById('playPat').classList.toggle('playing',!songMode);
  document.getElementById('playSong').classList.toggle('playing',songMode);
}
function stop(silent){
  if(SEQ.timer)clearInterval(SEQ.timer);SEQ.timer=null;
  if(SEQ.playing&&!silent){stopAllVoices()}
  SEQ.playing=false;SEQ.q=[];setPlayRow(-1);
  document.getElementById('playPat').classList.remove('playing');
  document.getElementById('playSong').classList.remove('playing');
}
function pump(){
  while(SEQ.next<AC.currentTime+.16){
    const pi=SEQ.songMode?song.order[SEQ.ord%song.order.length]:curPat;
    const pat=song.patterns[pi];if(!pat){stop();return}
    schedRow(pi,SEQ.row,SEQ.next);
    SEQ.q.push({pat:pi,row:SEQ.row,t:SEQ.next});
    SEQ.next+=rowDur();SEQ.row++;
    if(SEQ.row>=pat.rows){SEQ.row=0;if(SEQ.songMode)SEQ.ord=(SEQ.ord+1)%song.order.length}
  }
}
function schedRow(pi,row,t){
  const pat=song.patterns[pi];
  const soloed=song.trackset.some(s=>s.solo);
  for(let tr=0;tr<TRACKS;tr++){
    const ts=song.trackset[tr];
    if(ts.mute||(soloed&&!ts.solo))continue;
    const cell=pat.data[tr][row];if(!cell)continue;
    const ch=chans[tr];
    const vel=cell.v!=null?clamp(cell.v,0,64)/64:.8;
    const fxc=cell.c,fxv=cell.x||0;
    if(cell.n===OFF){if(ch.voice){ch.voice.release(t);ch.voice=null}}
    else if(cell.n!=null){
      const ii=cell.i!=null?cell.i:ch.lastI;
      const inst=ii!=null?song.instruments[ii]:null;
      if(inst){
        ch.lastI=ii;
        if(fxc==='G'&&ch.voice&&!ch.voice.dead){ch.voice.glideTo(cell.n,t,rowDur()*(fxv?fxv/16:1))}
        else{
          let hits=1,intv=0;
          if(fxc==='R'&&fxv>1){hits=Math.min(fxv,16);intv=rowDur()/hits}
          for(let k=0;k<hits;k++){
            const tt=t+k*intv;
            if(ch.voice)ch.voice.cut(tt);
            const nv=trig(inst,cell.n,tt,tr,vel*(k?0.8:1),fxc==='S'?fxv/256:0);
            ch.voice=nv;
            if(inst.type==='kick')duck(tt);
          }
        }
      }
    }
    if(fxc==='C'&&ch.voice&&ch.voice.filter){
      const f=40*Math.pow(300,fxv/255);
      ch.voice.filter.frequency.cancelScheduledValues(t);
      ch.voice.filter.frequency.setTargetAtTime(f,t,.015);
    }
    if((fxc==='U'||fxc==='D')&&ch.voice&&!ch.voice.dead){
      ch.voice.slide((fxc==='U'?1:-1)*fxv*12.5,t,rowDur());
    }
  }
}

function raf(){
  if(SEQ.playing&&AC){
    let cur=null;
    while(SEQ.q.length&&SEQ.q[0].t<=AC.currentTime+.004)cur=SEQ.q.shift();
    if(cur){
      if(cur.pat!==curPat){curPatSet(cur.pat)}
      setPlayRow(cur.row);
    }
  }
  requestAnimationFrame(raf);
}

/* ================= grid rendering ================= */
const gridwrap=document.getElementById('gridwrap'),
      ghead=document.getElementById('ghead'),
      grows=document.getElementById('grows');

function cellHTML(t,r){
  const c=cellAt(t,r)||{};
  const isCur=(cursor.t===t&&cursor.r===r);
  const sp=(ci,txt,set,extra)=>{
    let cls=set?'set':'';
    if(extra)cls+=' '+extra;
    if(inSel(t,ci,r))cls+=' ssel';
    if(isCur&&cursor.c===ci)cls+=' cur';
    return '<i data-c="'+ci+'" class="'+cls+'">'+txt+'</i>';
  };
  let nT='···',nSet=false,nOff='';
  if(c.n===OFF){nT='OFF';nSet=true;nOff='off'}
  else if(c.n!=null){nT=noteName(c.n);nSet=true}
  const i2=c.i!=null?hex2(c.i):'··';
  const v2=c.v!=null?hex2(c.v):'··';
  const fx=c.c?c.c+hex2(c.x||0):'···';
  return '<span class="tcell" data-t="'+t+'">'
    +sp(0,nT,nSet,nOff)+' '
    +sp(1,i2[0],c.i!=null)+sp(2,i2[1],c.i!=null)+' '
    +sp(3,v2[0],c.v!=null)+sp(4,v2[1],c.v!=null)+' '
    +sp(5,fx[0],!!c.c)+sp(6,fx[1],!!c.c)+sp(7,fx[2],!!c.c)
    +'</span>';
}
function rowInner(r){
  let h='<span class="rn">'+String(r).padStart(2,'0')+'</span>';
  for(let t=0;t<TRACKS;t++)h+=cellHTML(t,r);
  return h;
}
function renderRow(r){const el=grows.children[r];if(el)el.innerHTML=rowInner(r)}
function renderHead(){
  let h='<span class="rn">00&#160;</span>';
  for(let t=0;t<TRACKS;t++){
    const ts=song.trackset[t];
    h+='<span class="tcell thead" data-t="'+t+'"><span class="tno">'+String(t+1).padStart(2,'0')+'</span>'
      +'<button class="tbtn '+(ts.mute?'mON':'')+'" data-mu="'+t+'">M</button>'
      +'<button class="tbtn '+(ts.solo?'sON':'')+'" data-so="'+t+'">S</button></span>';
  }
  ghead.innerHTML=h;
  /* match cell widths: header tcells get same content width via padding of a hidden ruler — simpler: fixed min-width from a rendered row later */
  syncHeadWidths();
}
function syncHeadWidths(){
  const row=grows.children[0];if(!row)return;
  const cells=row.querySelectorAll('.tcell');
  const hcells=ghead.querySelectorAll('.tcell');
  cells.forEach((c,i)=>{if(hcells[i])hcells[i].style.minWidth=c.getBoundingClientRect().width+'px'});
  const rn=row.querySelector('.rn'),hrn=ghead.querySelector('.rn');
  if(rn&&hrn)hrn.style.minWidth=rn.getBoundingClientRect().width+'px';
}
function renderGrid(){
  const pat=song.patterns[curPat];
  cursor.r=clamp(cursor.r,0,pat.rows-1);
  let h='';
  for(let r=0;r<pat.rows;r++){
    let cls='prow';
    if(r%16===0)cls+=' b16';else if(r%4===0)cls+=' b4';
    h+='<div class="'+cls+'" data-r="'+r+'">'+rowInner(r)+'</div>';
  }
  grows.innerHTML=h;playRowEl=null;
  renderHead();
  document.getElementById('patLen').value=pat.rows;
  renderPatSel();renderOrder();
}
let lastCurRow=0;
function moveCursor(dt,dr,dc){
  const pat=song.patterns[curPat];
  const oldR=cursor.r;
  if(dc){let c=cursor.c+dc;let t=cursor.t;
    while(c<0){t=(t+TRACKS-1)%TRACKS;c+=8}
    while(c>7){t=(t+1)%TRACKS;c-=8}
    cursor.c=c;cursor.t=t;}
  if(dt){cursor.t=(cursor.t+dt+TRACKS)%TRACKS}
  if(dr){cursor.r=(cursor.r+dr%pat.rows+pat.rows)%pat.rows}
  renderRow(oldR);renderRow(cursor.r);
  trackPanel();
  const el=grows.children[cursor.r];
  if(el&&!SEQ.playing){
    const gw=gridwrap,top=el.offsetTop-40,bot=el.offsetTop+el.offsetHeight+40;
    if(top<gw.scrollTop)gw.scrollTop=top;
    else if(bot>gw.scrollTop+gw.clientHeight)gw.scrollTop=bot-gw.clientHeight;
  }
}
grows.addEventListener('mousedown',e=>{

/* ================= keyboard ================= */
const KEYMAP={z:0,s:1,x:2,d:3,c:4,v:5,g:6,b:7,h:8,n:9,j:10,m:11,',':12,l:13,'.':14,';':15,'/':16,
  q:12,'2':13,w:14,'3':15,e:16,r:17,'5':18,t:19,'6':20,y:21,'7':22,u:23,i:24,'9':25,o:26,'0':27,p:28};
const FXKEYS='rsudcg';
let previewKey=null;

document.addEventListener('keydown',e=>{
  const tag=e.target.tagName;
  if(tag==='INPUT'||tag==='SELECT'||tag==='TEXTAREA')return;
  const k=e.key;
  if(k===' '){e.preventDefault();if(SEQ.playing)stop();else play(false);return}
  if(k==='Escape'){stop();return}
  if(k==='ArrowUp'){e.preventDefault();moveCursor(0,-1,0);return}
  if(k==='ArrowDown'){e.preventDefault();moveCursor(0,1,0);return}
  if(k==='ArrowLeft'){e.preventDefault();moveCursor(0,0,-1);return}
  if(k==='ArrowRight'){e.preventDefault();moveCursor(0,0,1);return}
  if(k==='Tab'){e.preventDefault();cursor.c=0;moveCursor(e.shiftKey?-1:1,0,0);renderRow(cursor.r);return}
  if(k==='PageUp'){e.preventDefault();moveCursor(0,-16,0);return}
  if(k==='PageDown'){e.preventDefault();moveCursor(0,16,0);return}
  if(k==='Home'){e.preventDefault();moveCursor(0,-cursor.r,0);return}
  if(k==='End'){e.preventDefault();moveCursor(0,song.patterns[curPat].rows-1-cursor.r,0);return}
  if(k==='['){octave=clamp(octave-1,0,7);document.getElementById('oct').value=octave;return}
  if(k===']'){octave=clamp(octave+1,0,7);document.getElementById('oct').value=octave;return}
  if(k==='Delete'||k==='Backspace'){
    e.preventDefault();
    const cell=cellAt(cursor.t,cursor.r);
    if(cell){
      if(cursor.c===0){cell.n=null;cell.i=null}
      else if(cursor.c<=2)cell.i=null;
      else if(cursor.c<=4)cell.v=null;
      else{cell.c=null;cell.x=0}
      pruneCell(cursor.t,cursor.r);
    }
    renderRow(cursor.r);moveCursor(0,editStep,0);saveSoon();return;
  }
  const low=k.toLowerCase();
  /* note column */
  if(cursor.c===0){
    if(low==='a'||k==='`'){setNote(OFF,null);return}
    if(KEYMAP[low]!=null&&!e.ctrlKey&&!e.metaKey&&!e.altKey){
      e.preventDefault();
      const n=clamp(octave*12+KEYMAP[low],0,95);
      setNote(n,curInst);
      if(!e.repeat)previewNote(n,low);
      return;
    }
  }else if(cursor.c<=4){ /* hex digits: inst, vol */
    const d=parseInt(k,16);
    if(!isNaN(d)&&/^[0-9a-fA-F]$/.test(k)){
      e.preventDefault();
      const cell=ensureCell(cursor.t,cursor.r);
      if(cursor.c===1)cell.i=((cell.i||0)&0x0F)|(d<<4);
      else if(cursor.c===2)cell.i=((cell.i||0)&0xF0)|d;
      else if(cursor.c===3)cell.v=clamp(((cell.v||0)&0x0F)|(d<<4),0,64);
      else cell.v=clamp(((cell.v||0)&0xF0)|d,0,64);
      renderRow(cursor.r);moveCursor(0,editStep,0);saveSoon();return;
    }
  }else if(cursor.c===5){ /* fx letter */
    if(FXKEYS.includes(low)){
      e.preventDefault();
      const cell=ensureCell(cursor.t,cursor.r);
      cell.c=low.toUpperCase();
      renderRow(cursor.r);moveCursor(0,0,1);saveSoon();return;
    }
  }else{ /* fx value digits */
    const d=parseInt(k,16);
    if(!isNaN(d)&&/^[0-9a-fA-F]$/.test(k)){
      e.preventDefault();
      const cell=ensureCell(cursor.t,cursor.r);
      if(!cell.c)cell.c='C';
      if(cursor.c===6)cell.x=((cell.x||0)&0x0F)|(d<<4);
      else cell.x=((cell.x||0)&0xF0)|d;
      renderRow(cursor.r);moveCursor(0,editStep,0);saveSoon();return;
    }
  }
});
document.addEventListener('keyup',e=>{
  if(previewKey&&e.key.toLowerCase()===previewKey){
    previewKey=null;
    const ch=chans[cursor.t];
    if(ch&&ch.voice&&!SEQ.playing)ch.voice.release(AC.currentTime);
  }
});
function setNote(n,ii){
  const cell=ensureCell(cursor.t,cursor.r);
  cell.n=n;
  if(n!==OFF&&ii!=null)cell.i=ii;
  renderRow(cursor.r);moveCursor(0,editStep,0);saveSoon();
}
function previewNote(n,key){
  audio();if(AC.state==='suspended')AC.resume();
  const inst=song.instruments[curInst];if(!inst)return;
  const ch=chans[cursor.t],t=AC.currentTime+.005;
  if(ch.voice)ch.voice.cut(t);

  previewKey=key;
}

function renderParams(){

  document.getElementById('parTitle').textContent=ins?hex2(curInst)+' '+ins.name+' ['+ITYPES[ins.type].label+']':'Params';

      +'<span class="pv" id="pv_'+k+'">'+fmtP(val)+'</span></div>';
  }).join('');

function fmtP(v){return v>=100?Math.round(v):v>=10?v.toFixed(1):v.toFixed(2)}
document.getElementById('params').addEventListener('input',e=>{
  const k=e.target.dataset.k;if(!k)return;
  const ins=song.instruments[curInst];if(!ins)return;
  const[mn,mx,,ex]=ITYPES[ins.type].p[k];
  const t=+e.target.value/1000;
  const val=ex?mn*Math.pow(mx/mn,t):mn+(mx-mn)*t;
  ins.params[k]=val;
  document.getElementById('pv_'+k).textContent=fmtP(val);
  saveSoon();
});
function trackPanel(){
  const t=cursor.t,ts=song.trackset[t];
  document.getElementById('trkTitle').textContent='Track '+(t+1);
  const el=document.getElementById('trackMix');
  const rows=[['vol','Volume'],['dly','Delay'],['rvb','Reverb'],['duck','Duck']];
  el.innerHTML=rows.map(([k,lbl])=>
    '<div class="param"><span class="pn">'+lbl+'</span>'
    +'<input type="range" min="0" max="100" value="'+Math.round(ts[k]*100)+'" data-tk="'+k+'">'
    +'<span class="pv">'+Math.round(ts[k]*100)+'</span></div>'
  ).join('');
}
document.getElementById('trackMix').addEventListener('input',e=>{
  const k=e.target.dataset.tk;if(!k)return;
  const ts=song.trackset[cursor.t];
  ts[k]=+e.target.value/100;
  e.target.parentElement.querySelector('.pv').textContent=e.target.value;
  applyMix();saveSoon();
});

document.getElementById('smpFile').addEventListener('change',async e=>{
  audio();
  for(const f of e.target.files){
    const ab=await f.arrayBuffer();
    const b64=abToB64(ab);
    const ins=mkInst('sampler',f.name.replace(/\.[^.]+$/,''));
    ins.sampleB64=b64;ins.sampleName=f.name;
    try{ins.buffer=await AC.decodeAudioData(ab.slice(0))}catch(err){status('decode failed: '+f.name);continue}
    song.instruments.push(ins);
  }
  curInst=song.instruments.length-1;
  renderInstList();renderParams();saveSoon();
  e.target.value='';
});
function abToB64(ab){
  const u=new Uint8Array(ab);let s='';
  for(let i=0;i<u.length;i+=0x8000)s+=String.fromCharCode.apply(null,u.subarray(i,i+0x8000));
  return btoa(s);
}
function b64ToAb(b){const s=atob(b),u=new Uint8Array(s.length);for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i);return u.buffer}

/* ================= save / load ================= */
function serialize(withSamples){
  return JSON.stringify(song,(k,v)=>{
    if(k==='buffer')return undefined;
    if(k==='sampleB64'&&!withSamples)return undefined;
    return v;
  });
}
let saveT=null;
function saveSoon(){
  clearTimeout(saveT);
  saveT=setTimeout(()=>{
    try{localStorage.setItem('volt.song',serialize(true))}
    catch(e){try{localStorage.setItem('volt.song',serialize(false));status('samples too big for autosave — use Export')}catch(e2){}}
  },700);
}
async function loadSong(s){
  stop();
  song=s;
  song.trackset=song.trackset||mkTrackset();
  while(song.trackset.length<TRACKS)song.trackset.push({vol:.85,dly:0,rvb:0,duck:0,mute:false,solo:false});
  curPat=0;curInst=0;cursor.t=0;cursor.r=0;cursor.c=0;
  document.getElementById('bpm').value=song.bpm;
  if(AC){applyMix();setDelayTime()}
  for(const ins of song.instruments){
    if(ins.type==='sampler'&&ins.sampleB64&&!ins.buffer){
      try{audio();ins.buffer=await AC.decodeAudioData(b64ToAb(ins.sampleB64))}catch(e){}
    }
  }
  renderGrid();renderInstList();renderParams();trackPanel();
  status(song.name);
}
document.getElementById('expBtn').onclick=()=>{
  const blob=new Blob([serialize(true)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(song.name||'volt-song')+'.json';
  a.click();setTimeout(()=>URL.revokeObjectURL(a.href),5000);
};

function status(s){document.getElementById('status').textContent=s;
  setTimeout(()=>{if(document.getElementById('status').textContent===s)document.getElementById('status').textContent=''},4000)}

/* ================= templates ================= */
function put(pat,t,r,n,i,v,c,x){
  pat.data[t][r]={n:(n===undefined?null:n),i:(i===undefined?null:i),v:(v===undefined?null:v),c:c||null,x:x||0};
}
function tplDnb(){
  const s=blankSong();
  s.name='dnb';s.bpm=174;
  s.instruments=[
    mkInst('kick','Kick',{pitch:52,punch:.65,decay:.32,drive:.35}),
    mkInst('snare','Snare',{tone:205,snap:.8,decay:.15}),
    mkInst('hat','Hat C',{tone:8200,decay:.045}),
    mkInst('hat','Hat O',{tone:6800,decay:.28}),
    mkInst('reese','Reese',{voices:3,detune:22,cutoff:340,res:8,lfoRate:.35,lfoAmt:.35,drive:.6,sub:.5,rel:.09}),
    mkInst('sub','Sub',{harm:.15,rel:.07}),
  ];
  const ts=s.trackset;
  ts[0].vol=.92;ts[1].vol=.85;ts[1].rvb=.13;ts[2].vol=.5;ts[3].vol=.5;ts[3].dly=.1;
  ts[4].vol=.8;ts[4].dly=.07;ts[5].vol=.9;
  const p=mkPattern(64);
  const K=0,S=1,HC=2,HO=3,R=4,B=5;
  for(let bar=0;bar<4;bar++){
    const o=bar*16;
    put(p,0,o+0,48,K);put(p,0,o+10,48,K,44);
    put(p,1,o+4,48,S);put(p,1,o+12,48,S);
    if(bar===1||bar===3)put(p,1,o+14,48,S,20);
    for(let r=0;r<16;r+=2)if(r!==6&&r!==14)put(p,2,o+r,60,HC,r%4===0?40:22);
    put(p,3,o+6,60,HO,26);put(p,3,o+14,60,HO,22);
  }
  /* snare fill end of bar 4 */
  put(p,1,62,48,S,26,'R',2);put(p,1,63,48,S,32,'R',4);
  /* reese bassline in E minor: E-2=28 G-2=31 A-2=33 D-2=26 */
  put(p,4,0,28,R,null,'C',48); put(p,4,8,null,null,null,'C',110); put(p,4,12,31,R,null,'G',8);
  put(p,4,16,28,R,null,'C',56); put(p,4,22,33,R); put(p,4,24,null,null,null,'C',126); put(p,4,28,31,R,null,'G',10);
  put(p,4,32,28,R,null,'C',64); put(p,4,40,33,R,null,'C',140); put(p,4,46,31,R,null,'G',8);
  put(p,4,48,28,R,null,'C',72); put(p,4,56,26,R); put(p,4,60,null,null,null,'U',12); put(p,4,63,OFF);
  /* sub follows roots (E-1=16 G-1=19 A-1=21 D-1=14) */
  put(p,5,0,16,B);put(p,5,12,19,B);put(p,5,16,16,B);put(p,5,22,21,B);put(p,5,28,19,B);
  put(p,5,32,16,B);put(p,5,40,21,B);put(p,5,46,19,B);put(p,5,48,16,B);put(p,5,56,14,B);put(p,5,63,OFF);
  s.patterns=[p];s.order=[0];
  return s;
}
function tplTrance(){
  const s=blankSong();
  s.name='trance';s.bpm=138;
  s.instruments=[
    mkInst('kick','Kick',{pitch:46,punch:.7,decay:.5,drive:.25}),
    mkInst('clap','Clap',{tone:1250,decay:.28}),
    mkInst('hat','Hat C',{tone:9000,decay:.04}),
    mkInst('hat','Hat O',{tone:7000,decay:.22}),
    mkInst('sub','Bass',{harm:.3,rel:.05}),
    mkInst('pluck','Pluck',{cutoff:820,envAmt:.62,decay:.3,res:3.5}),
    mkInst('supersaw','Pad',{detune:32,spread:.9,hp:170,cutoff:5200,att:.14,rel:.5}),
  ];
  const ts=s.trackset;
  ts[0].vol=.95;
  ts[1].vol=.75;ts[1].rvb=.2;
  ts[2].vol=.42;ts[3].vol=.5;ts[3].dly=.12;
  ts[4].vol=.88;ts[4].duck=.5;
  ts[5].vol=.68;ts[5].dly=.4;ts[5].rvb=.12;ts[5].duck=.3;
  ts[6].vol=.5;ts[6].rvb=.28;ts[6].duck=.65;
  ts[7].vol=.45;ts[7].rvb=.28;ts[7].duck=.65;
  const p=mkPattern(64);
  const K=0,C=1,HC=2,HO=3,B=4,PL=5,PD=6;
  /* chords per bar: Am F C G — roots (oct3) 45 41 48 43 */
  const roots=[45,41,48,43];
  const kinds=[[0,3,7,12],[0,4,7,12],[0,4,7,12],[0,4,7,12]];
  const thirds=[60,57,64,59];
  const arpIdx=[0,1,2,3,2,1,0,2,1,3,2,1,0,1,2,3];
  for(let bar=0;bar<4;bar++){
    const o=bar*16, root=roots[bar], iv=kinds[bar];
    for(let r=0;r<16;r+=4)put(p,0,o+r,48,K);
    put(p,1,o+4,48,C);put(p,1,o+12,48,C);
    for(let r=1;r<16;r+=2)put(p,2,o+r,60,HC,14);
    for(let r=2;r<16;r+=4)put(p,3,o+r,60,HO,30);
    for(let r=2;r<16;r+=4)put(p,4,o+r,root-24,B,40);
    for(let r=0;r<16;r++)put(p,5,o+r,root+iv[arpIdx[r]],PL,r%4===0?40:20);
    put(p,6,o,root+12,PD,30);
    put(p,7,o,thirds[bar],PD,24);
  }
  put(p,1,62,48,C,22,'R',2);
  s.patterns=[p];s.order=[0];
  return s;
}
document.getElementById('tplDnb').onclick=()=>{if(confirm('Load DnB template? This replaces the current song.'))loadSong(tplDnb())};
document.getElementById('tplTrance').onclick=()=>{if(confirm('Load Trance template? This replaces the current song.'))loadSong(tplTrance())};

/* ================= selection / clipboard ================= */
let sel=null; /* {a:{t,c,r}, b:{t,c,r}} anchor + focus, display cols 0-7 */
let clip=null;
const LIN=(t,c)=>t*8+c;
function selRect(){if(!sel)return null;
  return{l1:Math.min(LIN(sel.a.t,sel.a.c),LIN(sel.b.t,sel.b.c)),
         l2:Math.max(LIN(sel.a.t,sel.a.c),LIN(sel.b.t,sel.b.c)),
         r1:Math.min(sel.a.r,sel.b.r),r2:Math.max(sel.a.r,sel.b.r)}}
function inSel(t,c,r){const s=selRect();if(!s)return false;
  const l=LIN(t,c);return l>=s.l1&&l<=s.l2&&r>=s.r1&&r<=s.r2}
function renderRows(a,b){const n=song.patterns[curPat].rows;
  for(let r=Math.max(0,a);r<=Math.min(b,n-1);r++)renderRow(r)}
function clearSel(){if(!sel)return;const s=selRect();sel=null;renderRows(s.r1,s.r2)}
/* which cell fields a track's covered display-columns touch: note=0, inst=1-2, vol=3-4, fx=5-7 */
function fieldsFor(t,s){
  const lo=Math.max(s.l1,t*8),hi=Math.min(s.l2,t*8+7);
  if(lo>hi)return null;
  const c1=lo-t*8,c2=hi-t*8;
  return{n:c1<=0&&0<=c2,i:c1<=2&&1<=c2,v:c1<=4&&3<=c2,fx:c1<=7&&5<=c2};
}
function copySel(cut){
  let s=selRect();
  if(!s)s={l1:LIN(cursor.t,cursor.c),l2:LIN(cursor.t,cursor.c),r1:cursor.r,r2:cursor.r};
  const t1=Math.floor(s.l1/8),t2=Math.floor(s.l2/8),data=[];
  for(let r=s.r1;r<=s.r2;r++){
    const row=[];
    for(let t=t1;t<=t2;t++){
      const f=fieldsFor(t,s),c=cellAt(t,r)||{};
      row.push({n:f.n?(c.n!=null?c.n:null):undefined,
                i:f.i?(c.i!=null?c.i:null):undefined,
                v:f.v?(c.v!=null?c.v:null):undefined,
                c:f.fx?(c.c||null):undefined,
                x:f.fx?(c.x||0):undefined});
    }
    data.push(row);
  }
  clip={data};
  if(cut){eraseRect(s);saveSoon()}
  status((cut?'cut ':'copied ')+(s.r2-s.r1+1)+' row'+(s.r2>s.r1?'s':''));
}
function eraseRect(s){
  const t1=Math.floor(s.l1/8),t2=Math.floor(s.l2/8);
  for(let t=t1;t<=t2;t++){
    const f=fieldsFor(t,s);if(!f)continue;
    for(let r=s.r1;r<=s.r2;r++){
      const c=cellAt(t,r);if(!c)continue;
      if(f.n)c.n=null;if(f.i)c.i=null;if(f.v)c.v=null;if(f.fx){c.c=null;c.x=0}
      pruneCell(t,r);
    }
  }
  renderRows(s.r1,s.r2);
}
function pasteClip(){
  if(!clip)return;
  const pat=song.patterns[curPat];
  for(let dr=0;dr<clip.data.length;dr++){
    const r=cursor.r+dr;if(r>=pat.rows)break;
    const row=clip.data[dr];
    for(let dt=0;dt<row.length;dt++){
      const t=cursor.t+dt;if(t>=TRACKS)break;
      const src=row[dt];
      if(src.n===undefined&&src.i===undefined&&src.v===undefined&&src.c===undefined)continue;
      const cell=ensureCell(t,r);
      if(src.n!==undefined)cell.n=src.n;
      if(src.i!==undefined)cell.i=src.i;
      if(src.v!==undefined)cell.v=src.v;
      if(src.c!==undefined){cell.c=src.c;cell.x=src.x||0}
      pruneCell(t,r);
    }
  }
  renderRows(cursor.r,cursor.r+clip.data.length-1);
  saveSoon();status('pasted');
}
/* selection keys run in capture phase so the main edit handler never sees them */
document.addEventListener('keydown',e=>{
  const tag=e.target.tagName;
  if(tag==='INPUT'||tag==='SELECT'||tag==='TEXTAREA')return;
  const k=e.key,low=k.toLowerCase();
  const ARROWS={ArrowUp:[-1,0],ArrowDown:[1,0],ArrowLeft:[0,-1],ArrowRight:[0,1]};
  if(e.shiftKey&&ARROWS[k]){
    e.preventDefault();e.stopImmediatePropagation();
    if(!sel)sel={a:{t:cursor.t,c:cursor.c,r:cursor.r},b:{t:cursor.t,c:cursor.c,r:cursor.r}};
    const[dr,dc]=ARROWS[k],pat=song.patterns[curPat],old=selRect(),oldR=cursor.r;
    let{t,c,r}=sel.b;
    if(dr)r=clamp(r+dr,0,pat.rows-1);
    if(dc){const l=clamp(LIN(t,c)+dc,0,TRACKS*8-1);t=Math.floor(l/8);c=l%8}
    sel.b={t,c,r};
    cursor.t=t;cursor.c=c;cursor.r=r;
    const nr=selRect();
    renderRows(Math.min(old.r1,nr.r1,oldR),Math.max(old.r2,nr.r2,oldR));
    trackPanel();
    const el=grows.children[cursor.r];
    if(el&&!SEQ.playing){
      const gw=gridwrap,top=el.offsetTop-40,bot=el.offsetTop+el.offsetHeight+40;
      if(top<gw.scrollTop)gw.scrollTop=top;
      else if(bot>gw.scrollTop+gw.clientHeight)gw.scrollTop=bot-gw.clientHeight;
    }
    return;
  }
  if((e.ctrlKey||e.metaKey)&&low==='a'){
    e.preventDefault();e.stopImmediatePropagation();
    const pat=song.patterns[curPat];
    const col={a:{t:cursor.t,c:cursor.c,r:0},b:{t:cursor.t,c:cursor.c,r:pat.rows-1}};
    const trk={a:{t:cursor.t,c:0,r:0},b:{t:cursor.t,c:7,r:pat.rows-1}};
    const all={a:{t:0,c:0,r:0},b:{t:TRACKS-1,c:7,r:pat.rows-1}};
    const same=(x,y)=>x&&JSON.stringify(x)===JSON.stringify(y);
    sel=same(sel,col)?trk:same(sel,trk)?all:col;
    renderRows(0,pat.rows-1);
    status(same(sel,col)?'column selected':same(sel,trk)?'track selected':'all selected');
    return;
  }
  if((e.ctrlKey||e.metaKey)&&(low==='c'||low==='x')){
    e.preventDefault();e.stopImmediatePropagation();copySel(low==='x');return;
  }
  if((e.ctrlKey||e.metaKey)&&low==='v'){
    e.preventDefault();e.stopImmediatePropagation();pasteClip();return;
  }
  if(k==='Escape'&&sel){e.stopImmediatePropagation();clearSel();return}
  if((k==='Delete'||k==='Backspace')&&sel){
    e.preventDefault();e.stopImmediatePropagation();
    eraseRect(selRect());clearSel();saveSoon();return;
  }
  if(ARROWS[k]&&sel)clearSel();
},true);
/* mouse drag selection */
let dragSel=null;
grows.addEventListener('mousedown',e=>{
  if(e.button!==0)return;
  if(!e.target.closest('.tcell'))return;
  e.preventDefault();
  clearSel();
  dragSel={t:cursor.t,c:cursor.c,r:cursor.r};
});
grows.addEventListener('mouseover',e=>{
  if(!dragSel)return;
  const i=e.target.closest('i[data-c]'),cell=e.target.closest('.tcell'),row=e.target.closest('.prow');
  if(!cell||!row)return;
  const b={t:+cell.dataset.t,c:i?+i.dataset.c:0,r:+row.dataset.r};
  if(!sel&&b.t===dragSel.t&&b.c===dragSel.c&&b.r===dragSel.r)return;
  const old=sel?selRect():null;
  sel={a:{...dragSel},b};
  const nr=selRect();
  renderRows(old?Math.min(old.r1,nr.r1):nr.r1,old?Math.max(old.r2,nr.r2):nr.r2);
});
document.addEventListener('mouseup',()=>{dragSel=null});

/* ================= Everything (voidtools) sample search ================= */
const $id=s=>document.getElementById(s);
let esCfgStored={};try{esCfgStored=JSON.parse(localStorage.getItem('volt.es')||'{}')}catch(e){}
const ES=Object.assign({host:'localhost',port:8667,user:'',pass:'',exts:'wav;mp3;aiff;aif;m4a;ogg;flac',copy:true},esCfgStored);
/* when the page itself is served by the Everything HTTP server, talk to it same-origin —
   avoids CORS entirely and any localhost vs 127.0.0.1 mismatch */
const esSameOrigin=location.protocol==='http:'&&/^(localhost|127\.0\.0\.1)$/.test(location.hostname);
const esBase=()=>esSameOrigin?location.origin:'http://'+ES.host+':'+ES.port;
const esHdrs=()=>ES.user?{Authorization:'Basic '+btoa(ES.user+':'+ES.pass)}:{};
function esMsg(s,err){const m=$id('esMsg');m.textContent=s||'';m.className=err?'err':''}
function esLoadCfgUI(){$id('esHost').value=ES.host;$id('esPort').value=ES.port;$id('esUser').value=ES.user;$id('esPass').value=ES.pass;$id('esExts').value=ES.exts;$id('esCopy').checked=ES.copy}
$id('esCfgBtn').onclick=()=>{const p=$id('esCfgPanel');p.hidden=!p.hidden;if(!p.hidden)esLoadCfgUI()};
$id('esSave').onclick=()=>{
  ES.host=$id('esHost').value.trim()||'localhost';ES.port=+$id('esPort').value||8667;
  ES.user=$id('esUser').value;ES.pass=$id('esPass').value;
  ES.exts=$id('esExts').value.trim();ES.copy=$id('esCopy').checked;
  localStorage.setItem('volt.es',JSON.stringify(ES));
  $id('esCfgPanel').hidden=true;esMsg('settings saved');
};
let esT=null,esRes=[];
$id('esQ').addEventListener('input',()=>{clearTimeout(esT);esT=setTimeout(esSearch,350)});
$id('esQ').addEventListener('keydown',e=>{if(e.key==='Enter'){clearTimeout(esT);esSearch()}});
async function esSearch(){
  const q=$id('esQ').value.trim();
  if(!q){$id('esResults').innerHTML='';esMsg('');return}
  const query=q+(ES.exts?' ext:'+ES.exts:'')+' !.pek !.cfa !appdata !"media cache"';
  const url=esBase()+'/?search='+encodeURIComponent(query)+'&json=1&path_column=1&count=40';
  esMsg('searching…');
  try{
    const r=await fetch(url,{headers:esHdrs()});
    if(r.status===401){esMsg('auth failed — set user/pass in ⚙ settings',1);return}
    if(!r.ok){esMsg('Everything server error '+r.status,1);return}
    const j=await r.json();
    esRes=(j.results||[]).filter(x=>x.type==='file');
    $id('esResults').innerHTML=esRes.map((x,i)=>
      '<div class="esrow"><div class="nm" title="'+esc(x.path+'\\'+x.name)+'"><b>'+esc(x.name)+'</b><span>'+esc(x.path)+'</span></div>'
      +'<button data-pv="'+i+'" title="Preview">&#9654;</button><button data-add="'+i+'" title="Add as sampler instrument">+</button></div>').join('');
    esMsg(j.totalResults>esRes.length?'showing '+esRes.length+' of '+j.totalResults:esRes.length+' result'+(esRes.length===1?'':'s'));
  }catch(err){
    if(location.protocol==='https:')
      esMsg('This hosted page can’t reach localhost (the claude.ai sandbox blocks it). Use the “VOLT Tracker” shortcut on your Desktop instead.',1);
    else if(location.protocol==='file:')
      esMsg('You opened volt.html directly, so the browser blocks Everything’s replies (file:// has no origin). Use the “VOLT Tracker” Desktop shortcut — it opens this same page through the Everything server at http://localhost:8667.',1);
    else
      esMsg('Cannot reach Everything at '+esBase()+' — check Tools → Options → HTTP Server is enabled and the host/port in ⚙ match.',1);
  }
}
function esFileURL(x){
  const full=x.path+'\\'+x.name;
  return esBase()+'/'+full.split('\\').filter(s=>s!=='').map(encodeURIComponent).join('/');
}
async function esFetchFile(x){
  const r=await fetch(esFileURL(x),{headers:esHdrs()});
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.arrayBuffer();
}
let pvSrc=null,pvIdx=-1;
async function esPreview(i){
  audio();if(AC.state==='suspended')AC.resume();
  if(pvSrc){try{pvSrc.stop()}catch(e){}pvSrc=null;if(pvIdx===i){pvIdx=-1;return}}
  pvIdx=i;
  try{
    const ab=await esFetchFile(esRes[i]);
    const buf=await AC.decodeAudioData(ab);
    if(pvIdx!==i)return;
    const s=AC.createBufferSource();s.buffer=buf;
    const g=AC.createGain();g.gain.value=.9;
    s.connect(g);g.connect(master);
    s.onended=()=>{if(pvSrc===s)pvSrc=null};
    s.start();pvSrc=s;
  }catch(err){esMsg('preview failed: '+err.message,1)}
}
async function esAdd(i){
  const x=esRes[i];
  audio();if(AC.state==='suspended')AC.resume();
  esMsg('loading '+x.name+'…');
  let ab;
  try{ab=await esFetchFile(x)}catch(err){esMsg('download failed: '+err.message,1);return}
  const ins=mkInst('sampler',x.name.replace(/\.[^.]+$/,''));
  ins.sampleName=x.name;ins.sourcePath=x.path+'\\'+x.name;
  ins.sampleB64=abToB64(ab);
  try{ins.buffer=await AC.decodeAudioData(ab.slice(0))}catch(err){esMsg('decode failed: '+x.name,1);return}
  song.instruments.push(ins);
  curInst=song.instruments.length-1;
  renderInstList();renderParams();saveSoon();
  let m='added '+hex2(curInst)+' '+x.name;
  if(ES.copy&&projDir){
    try{await copyToProject(x.name,ab);m+=' → copied to '+projDir.name}
    catch(err){m+=' (copy failed: '+err.message+')'}
  }
  esMsg(m);
}
$id('esResults').addEventListener('click',e=>{
  const pv=e.target.dataset.pv,ad=e.target.dataset.add;
  if(pv!=null)esPreview(+pv);
  else if(ad!=null)esAdd(+ad);
});
/* project folder (File System Access API, persisted in IndexedDB) */
let projDir=null;
function kv(mode,key,val){return new Promise((res,rej)=>{
  const q=indexedDB.open('volt-fs',1);
  q.onupgradeneeded=()=>q.result.createObjectStore('kv');
  q.onerror=()=>rej(q.error);
  q.onsuccess=()=>{
    const tx=q.result.transaction('kv',mode==='set'?'readwrite':'readonly');
    const r=mode==='set'?tx.objectStore('kv').put(val,key):tx.objectStore('kv').get(key);
    r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);
  };
})}
async function ensureDirPerm(){
  if(!projDir)return false;
  if(await projDir.queryPermission({mode:'readwrite'})==='granted')return true;
  return(await projDir.requestPermission({mode:'readwrite'}))==='granted';
}
async function copyToProject(name,ab){
  if(!(await ensureDirPerm()))throw new Error('no folder permission');
  const fh=await projDir.getFileHandle(name,{create:true});
  const w=await fh.createWritable();await w.write(ab);await w.close();
}
$id('esDir').onclick=async()=>{
  if(!window.showDirectoryPicker){esMsg('folder copy needs Chrome/Edge (File System Access API)',1);return}
  try{
    projDir=await showDirectoryPicker({id:'volt-proj',mode:'readwrite'});
    await kv('set','projDir',projDir);
    $id('esDirName').textContent='→ '+projDir.name;
    esMsg('project folder set');
  }catch(e){}
};
kv('get','projDir').then(h=>{if(h){projDir=h;$id('esDirName').textContent='→ '+h.name}}).catch(()=>{});

/* ================= boot ================= */
document.addEventListener('pointerdown',()=>{if(AC&&AC.state==='suspended')AC.resume()},true);
window.addEventListener('resize',syncHeadWidths);
(function boot(){
  let s=null;
  try{const raw=localStorage.getItem('volt.song');if(raw)s=JSON.parse(raw)}catch(e){}
  loadSong(s||tplDnb());
  requestAnimationFrame(raf);
})();
</script>
